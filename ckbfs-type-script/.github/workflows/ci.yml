name: CKBFS CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Job 1: Native checks (fast, no RISC-V required) ─────────────────────────
  check-native:
    name: Check & Lint (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (native target)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests (native — hash + cell_data parsers)
        run: cargo test --lib

  # ── Job 2: RISC-V cross-compilation ─────────────────────────────────────────
  build-riscv:
    name: Cross-compile (riscv64imac)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + RISC-V target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64imac-unknown-none-elf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-riscv-${{ hashFiles('**/Cargo.lock') }}

      - name: Build debug binary (RISC-V)
        run: cargo build --target riscv64imac-unknown-none-elf

      - name: Build release binary (RISC-V)
        run: cargo build --release --target riscv64imac-unknown-none-elf

      - name: Upload release binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ckbfs-type-script-riscv64
          path: target/riscv64imac-unknown-none-elf/release/ckbfs-type-script
          retention-days: 14

  # ── Job 3: Off-chain simulation tests ───────────────────────────────────────
  test-simulator:
    name: Off-chain Simulation Tests
    runs-on: ubuntu-latest
    needs: build-riscv
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + RISC-V target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64imac-unknown-none-elf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-riscv-${{ hashFiles('**/Cargo.lock') }}

      - name: Build debug binary (required by simulation tests)
        run: cargo build --target riscv64imac-unknown-none-elf

      - name: Run off-chain simulation tests
        run: cargo test --features native-simulator -- --nocapture

  # ── Job 4: Security audit ────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
